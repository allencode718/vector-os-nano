# Go2 quadruped local planner config (tuned for indoor house exploration)
# Based on vector_navigation_stack unitree_go2.yaml with adjustments for:
# - Actual Go2 dimensions from URDF/MJCF (0.6m x 0.3m body)
# - Better obstacle avoidance (wider clearance, larger path range)
# - Smoother navigation in narrow doorways

sensorMountingOffsets:
  ros__parameters:
    sensorOffsetX: 0.2
    sensorOffsetY: 0.0
    sensorOffsetZ: 0.1
    cameraOffsetX: 0.1
    cameraOffsetY: 0.0
    cameraOffsetZ: -0.04
    cameraOffsetPitch: -0.2094395

feature_extraction_node:
  ros__parameters:
    lidar_flip: false
    blindFront: 0.1
    blindBack: -0.4
    blindLeft: 0.1
    blindRight: -0.1
    blindDiskLow: -0.05
    blindDiskHigh: 0.05
    blindDiskRadius: 0.5

imu_preintegration_node:
  ros__parameters:
    lidar_flip: false

localPlanner:
  ros__parameters:
    # Obstacle height threshold — Go2 can step over ~3cm obstacles
    obstacleHeightThre: 0.08

    # Vehicle dimensions — actual Go2 body with legs extended
    # MJCF: body box 0.376x0.094m, legs add ~0.1m each side
    # Total footprint: ~0.6m long x 0.3m wide
    vehicleLength: 0.6
    vehicleWidth: 0.35     # was 0.5 — too wide, blocks narrow doorways (0.8m wide)

    # Speed limits
    maxSpeed: 0.8
    autonomySpeed: 0.8

    # Path planning — larger range for better obstacle avoidance
    pathScale: 1.0         # was 0.8 — wider path search
    minPathScale: 0.5      # was 0.6 — allow tighter paths in doorways
    pathScaleStep: 0.1
    minPathRange: 1.0      # was 0.8 — plan further ahead
    pathRangeStep: 0.5
    adjacentRange: 3.5     # was 3.0 — consider wider area for obstacles

    # Goal tolerances
    goalClearRange: 0.5    # was 0.6 — more precise goal reaching
    goalBehindRange: 0.8
    goalReachedThreshold: 0.3
    goalYawThreshold: 0.15

pathFollower:
  ros__parameters:
    # Control parameters — C++ pathFollower (disabled in bridge, but localPlanner uses these)
    lookAheadDis: 0.8      # was 0.5 — look further ahead to avoid walls
    maxAccel: 1.5          # was 1.0 — faster acceleration
    goalYawGain: 1.0

    # Speed limits
    maxSpeed: 0.8
    autonomySpeed: 0.8

    # Slow down threshold
    slowDwnDisThre: 1.0    # was 0.875 — start slowing earlier near obstacles
    omniDirDiffThre: 1.5
    yawRateGain: 0.75
    stopYawRateGain: 0.75
    maxYawRate: 60.0
    dirDiffThre: 0.4
    stopDisThre: 0.3
